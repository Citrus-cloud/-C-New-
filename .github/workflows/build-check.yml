name: Build Check

# Запускается при открытии/обновлении PR в main, а также вручную.
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Системные зависимости, нужные raylib для десктоп-сборки (OpenGL/X11/Wayland).
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev wayland-protocols

      # POST_BUILD в CMakeLists копирует assets/ — создаём пустую папку, чтобы шаг не падал.
      - name: Prepare assets dir
        run: mkdir -p assets

      - name: Configure (CMake)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release 2>&1 | tee -a build.log

      - name: Build
        run: cmake --build build --config Release 2>&1 | tee -a build.log

      # Публикуем статус и хвост лога компиляции прямо в комментарий PR.
      - name: Post result as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: $ secrets.GITHUB_TOKEN 
        run: |
          {
            echo "## Результат сборки CI: $ job.status "
            echo ""
            echo "Коммит: \`$ github.sha \`"
            echo ""
            echo "### Хвост лога компиляции (последние ~60000 символов)"
            echo '```'
            tail -c 60000 build.log 2>/dev/null || echo "(лог пуст)"
            echo '```'
          } > comment.md
          gh pr comment "$ github.event.pull_request.number " --body-file comment.md
